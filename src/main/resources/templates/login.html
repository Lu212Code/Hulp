<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Hulp – Login</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background: #121212;
            font-family: 'Segoe UI', sans-serif;
        }
        .login-card {
            background: #1c1c1c;
            padding: 40px;
            border-radius: 15px;
            border-top: 5px solid #b71c1c;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .login-card h1 { color: white; margin-bottom: 10px; }
        .login-card p { color: #888; margin-bottom: 30px; }
        
        .input-group { text-align: left; margin-bottom: 20px; }
        .input-group label { display: block; color: #bbb; margin-bottom: 5px; font-size: 0.9em; }
        .input-group input {
            width: 100%;
            padding: 12px;
            background: #2a2a2a;
            border: 1px solid #444;
            border-radius: 8px;
            color: white;
            outline: none;
        }
        .input-group input:focus { border-color: #b71c1c; }
        
        .error-msg {
            background: rgba(183, 28, 28, 0.2);
            color: #ff5252;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.85em;
        }
        
		/* --- MOBILE OPTIMIZATION (Login/Forms) --- */
		@media (max-width: 480px) {
		    body {
		        padding: 20px; /* Verhindert, dass die Card den Rand berührt */
		        height: auto;  /* Erlaubt Scrollen, falls die Tastatur aufpoppt */
		        min-height: 100vh;
		    }
		    .login-card {
		        padding: 25px 20px; /* Etwas kompakter auf kleinen Screens */
		        width: 100%;
		        box-sizing: border-box; /* Wichtig, damit Padding die Breite nicht sprengt */
		    }
		    .input-group input {
		        font-size: 16px; /* Verhindert automatisches Zoomen bei iOS (Safari) */
		        padding: 15px 10px; /* Größere Klickfläche für Finger */
		    }
		    .btn {
		        padding: 15px !important; /* Bessere Bedienbarkeit */
		    }
		}
    </style>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <div class="login-card">
        <h1>Hulp 🎓</h1>
        <p>Bitte logge dich ein, um fortzufahren.</p>

        <div th:if="${param.error}" class="error-msg">
            Ungültiger Nutzername oder Passwort.
        </div>

        <form th:action="@{/login}" method="post">
            <div class="input-group">
                <label>Benutzername</label>
                <input type="text" name="username" required autofocus>
            </div>
            <div class="input-group">
                <label>Passwort</label>
                <input type="password" name="password" required>
            </div>
            <button type="submit" class="btn" style="width: 100%; padding: 12px;">Einloggen</button>
        </form>
        
        <p style="margin-top: 25px; font-size: 0.8em;">
            Noch keinen Account? Wende dich and deinen Klassenlehrer.
        </p>
        
		<div style="margin-top: 30px; border-top: 1px solid #333; padding-top: 15px; font-size: 0.75em;">
		    <a th:href="@{/datenschutz}" style="color: #666; text-decoration: none; margin: 0 5px;">Datenschutz</a>
		    <a th:href="@{/nutzungsbedingungen}" style="color: #666; text-decoration: none; margin: 0 5px;">Nutzungsbedingungen</a>
		    <a th:href="@{/agb}" style="color: #666; text-decoration: none; margin: 0 5px;">AGB</a>
		</div>
    </div>
</body>
</html>
